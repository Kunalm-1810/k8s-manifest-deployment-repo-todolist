replicaCount: 2
namespace: production
image:
  repository: todolist-frontend
  tag: "1.0.0"
ingress:
  enabled: true
  host: todolist.example.com
  path: /
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    cpuUtilization: 60