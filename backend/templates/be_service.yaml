apiVersion: v1
kind: Service
metadata:
  name: be-app
  namespace: {{ .Values.namespace }}
  labels:
    app: be-app    
spec:
  type: {{ .Values.service.type }}
  selector:
    app: be-app
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
